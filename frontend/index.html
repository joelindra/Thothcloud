<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThothCloud | Secure LAN Storage</title>
    <meta name="description" content="Secure, offline-first local cloud server for LAN environments." />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- ⚡ FLASH PREVENTION: Apply theme synchronously before React mounts to avoid dark→light flicker -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('thoth_theme');
          if (theme) {
            document.documentElement.className = theme;
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
